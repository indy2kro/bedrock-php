name: Deploy to GitHub Pages

on:
  push:
    branches: [main, 'v*']
    tags: ['v*']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install mkdocs-material

      - name: Determine output paths
        id: paths
        run: |
          REF="${{ github.ref_name }}"
          if [[ "$REF" == "main" ]]; then
            echo "VERSION_DIR=dev" >> $GITHUB_OUTPUT
            echo "VERSION_NAME=dev" >> $GITHUB_OUTPUT
          elif [[ "$REF" == v*.* ]]; then
            echo "VERSION_DIR=$REF" >> $GITHUB_OUTPUT
            echo "VERSION_NAME=$REF" >> $GITHUB_OUTPUT
          else
            echo "VERSION_DIR=dev" >> $GITHUB_OUTPUT
            echo "VERSION_NAME=dev" >> $GITHUB_OUTPUT
          fi

      - name: Checkout existing gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: sitegh-pages
          sparse-checkout: |
            v*
            dev
          sparse-checkout-cone-mode: false
        continue-on-error: true

      - name: Setup site directory with existing versions
        run: |
          mkdir -p site/
          # Copy existing version directories from gh-pages
          cp -r sitegh-pages/v* site/ 2>/dev/null || true
          cp -r sitegh-pages/dev site/ 2>/dev/null || true

      - name: Copy source files
        run: mkdir -p docs/src && cp -r src/* docs/src/

      - name: Replace version placeholder in source files
        run: find docs/src -name "*.md" -exec sed -i 's/VERSION_PLACEHOLDER/${{ steps.paths.outputs.VERSION_NAME }}/g' {} \;

      - name: Generate version index (for MkDocs)
        env:
          VERSION_DIR: ${{ steps.paths.outputs.VERSION_DIR }}
          SITE_GH_PAGES_PATH: sitegh-pages
        run: python scripts/generate-index.py

      - name: Replace version placeholder in generated index
        run: sed -i 's/VERSION_PLACEHOLDER/${{ steps.paths.outputs.VERSION_NAME }}/g' docs/index.md

      - name: Build MkDocs to version directory
        run: mkdocs build -d site/${{ steps.paths.outputs.VERSION_DIR }}

      - name: Generate standalone version picker for root
        env:
          VERSION_DIR: ${{ steps.paths.outputs.VERSION_DIR }}
          SITE_GH_PAGES_PATH: sitegh-pages
        run: python scripts/generate-index.py

      - name: Create zip archive
        run: |
          VERSION_NAME=${{ steps.paths.outputs.VERSION_NAME }}
          VERSION_DIR=${{ steps.paths.outputs.VERSION_DIR }}
          
          # Create a temp directory for zip contents
          mkdir -p zip-temp/${VERSION_DIR}
          
          # Copy the built site (excluding html, but keeping assets)
          cp -r site/${VERSION_DIR}/* zip-temp/${VERSION_DIR}/ 2>/dev/null || true
          
          # Copy markdown source files to src/ subdirectory in zip
          mkdir -p zip-temp/${VERSION_DIR}/src
          cp -r docs/src/* zip-temp/${VERSION_DIR}/src/
          
          # Create zip from temp directory (includes both HTML site + markdown sources)
          cd zip-temp
          zip -r ../bedrock-php-${VERSION_NAME}.zip . -x "*.xml" "search*" "__pycache__/*"
          
          # Copy zip to site for release-action to find
          cp ../bedrock-php-${VERSION_NAME}.zip ../site/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          keep_files: true
          allow_empty_commit: true

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "site/bedrock-php-${{ steps.paths.outputs.VERSION_NAME }}.zip"
          allowUpdates: true
